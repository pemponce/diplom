apiVersion: apps/v1
kind: Deployment
metadata:
  name: forecast-service
  labels:
    app: forecast-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: forecast-service
  template:
    metadata:
      labels:
        app: forecast-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8082"
    spec:
      containers:
        - name: forecast-service
          image: platform/forecast-service:latest
          ports:
            - containerPort: 8082
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka:29092"
            - name: FORECAST_EMA_ALPHA
              value: "0.3"
            - name: FORECAST_SCALE_UP_THRESHOLD
              value: "150.0"
            - name: FORECAST_SCALE_DOWN_THRESHOLD
              value: "50.0"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 30
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: forecast-service
spec:
  selector:
    app: forecast-service
  ports:
    - port: 8082
      targetPort: 8082
