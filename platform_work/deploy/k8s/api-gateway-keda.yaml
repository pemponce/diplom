# KEDA ScaledObject: масштабирует api-gateway по прогнозному RPS
# forecast-service предоставляет метрику через HTTP external scaler
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: api-gateway-keda
spec:
  scaleTargetRef:
    name: api-gateway
  minReplicaCount: 1
  maxReplicaCount: 10
  cooldownPeriod: 60
  triggers:
    - type: external-push
      metadata:
        scalerAddress: "forecast-service:8082"
